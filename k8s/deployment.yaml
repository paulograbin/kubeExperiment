apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-experiment
  namespace: multivac
  labels:
    app: kube-experiment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-experiment
  template:
    metadata:
      labels:
        app: kube-experiment
    spec:
      containers:
      - name: kube-experiment
        image: paulograbin/kube-experiment:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3

